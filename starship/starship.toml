"$schema" = 'https://starship.rs/config-schema.json'

# Modern, compact two-line prompt with Tokyo Night-ish palette.
add_newline = true
command_timeout = 1000

format = """
[](#7aa2f7)\
$os\
$username\
[](bg:#3b4261 fg:#7aa2f7)\
$directory\
[](fg:#3b4261 bg:#414868)\
$git_branch\
$git_status\
[](fg:#414868 bg:#1a1b26)\
$nodejs\
$python\
$rust\
$golang\
$java\
$docker_context\
[ ](fg:#1a1b26)\
$cmd_duration\
$line_break\
$character"""

palette = "tokyonight"

[palettes.tokyonight]
bg          = "#1a1b26"
bg_dark     = "#16161e"
bg_highlight= "#292e42"
terminal_blk= "#414868"
fg          = "#c0caf5"
blue        = "#7aa2f7"
cyan        = "#7dcfff"
purple      = "#bb9af7"
green       = "#9ece6a"
yellow      = "#e0af68"
orange      = "#ff9e64"
red         = "#f7768e"

[os]
disabled = false
style = "bg:#7aa2f7 fg:#1a1b26"

[os.symbols]
Macos = " "
Linux = " "
Ubuntu = " "
Debian = " "

[username]
show_always = true
style_user = "bg:#7aa2f7 fg:#1a1b26"
style_root = "bg:#7aa2f7 fg:#1a1b26"
format = '[ $user ]($style)'

[directory]
style = "bg:#3b4261 fg:#c0caf5"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:#414868 fg:#c0caf5"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#414868 fg:#c0caf5"
format = '[($all_status$ahead_behind )]($style)'

[nodejs]
symbol = ""
style = "bg:#1a1b26 fg:#9ece6a"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = ""
style = "bg:#1a1b26 fg:#e0af68"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:#1a1b26 fg:#ff9e64"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = ""
style = "bg:#1a1b26 fg:#7dcfff"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = ""
style = "bg:#1a1b26 fg:#f7768e"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = ""
style = "bg:#1a1b26 fg:#7aa2f7"
format = '[ $symbol $context ]($style)'

[cmd_duration]
min_time = 2000
style = "fg:#e0af68"
format = ' [ $duration]($style)'

[character]
success_symbol = "[❯](bold #9ece6a)"
error_symbol   = "[❯](bold #f7768e)"
vimcmd_symbol  = "[❮](bold #bb9af7)"

[line_break]
disabled = false
